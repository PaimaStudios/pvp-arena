<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PvP Arena</title>
    <style media='screen' type='text/css'>
      @font-face {
        font-family: yana;
        src: url('public/yana.ttf');
        font-weight:400;
        font-weight:normal;
      }

      /* ── Shared popup / overlay styles ── */
      .pvp-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.82);
        display: flex; align-items: center; justify-content: center; z-index: 9999;
      }
      .pvp-overlay-box {
        position: relative; min-width: 300px; max-width: 800px; padding: 24px;
        background: #1a1a0e; border: 2px solid #3a3a20; border-radius: 6px;
        color: #f5f5ed; font-family: yana, sans-serif; text-align: center;
      }
      .pvp-overlay-box--wide {
        width: 760px; height: 560px; padding: 0; overflow: hidden;
        text-align: left;
      }
      .pvp-overlay-close {
        position: absolute; top: 6px; right: 8px;
        background: #1a1a0e; border: 1px solid #aabb44; border-radius: 3px;
        color: #f5f5ed; font-family: monospace; font-size: 14px;
        width: 24px; height: 24px; cursor: pointer; z-index: 1;
        line-height: 1; padding: 0;
      }
      .pvp-popup-title { font-size: 36px; margin: 0 0 20px; color: #f5f5ed; }
      .pvp-popup-body { font-size: 26px; margin: 0 0 12px; color: #d0d0b8; }
      .pvp-popup-detail { font-size: 24px; margin: 0 0 8px; color: #d0d0b8; }
      .pvp-popup-accent { color: #aabb44; }
      .pvp-popup-muted { font-size: 22px; margin: 0; color: #999988; }
      .pvp-popup-error { font-size: 24px; margin: 0; color: #cc6666; }
      .pvp-popup-desc { font-size: 18px; margin: 0 0 24px; color: #bbbbaa; line-height: 1.5; }
      .pvp-btn-primary {
        display: block; padding: 14px 28px; margin: 0 0 14px;
        background: #aabb44; color: #1a1a0e;
        border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 22px;
      }
      .pvp-btn-outline {
        display: block; padding: 14px 28px;
        background: transparent; color: #aabb44;
        border: 1px solid #aabb44; border-radius: 4px;
        text-decoration: none; font-weight: bold; font-size: 22px;
      }
      .pvp-footer-link {
        font-family: yana, sans-serif; font-size: 24px;
        color: #999988; text-decoration: none; letter-spacing: 0.5px;
      }
      /* Leaderboard table */
      .pvp-lb-wrap {
        width: 100%; height: 100%; display: flex; flex-direction: column;
      }
      .pvp-lb-header {
        padding: 18px 24px 12px; border-bottom: 1px solid #3a3a20;
      }
      .pvp-lb-header h2 { margin: 0; font-size: 36px; color: #f5f5ed; }
      .pvp-lb-header p { margin: 4px 0 0; font-size: 26px; color: #999988; }
      .pvp-lb-body {
        flex: 1; overflow-y: auto; padding: 8px 24px;
      }
      .pvp-lb-table { width: 100%; border-collapse: collapse; }
      .pvp-lb-table th {
        text-align: left; font-size: 26px; color: #999988;
        padding: 6px 8px; border-bottom: 1px solid #3a3a20;
      }
      .pvp-lb-table td {
        font-size: 26px; color: #d0d0b8; padding: 8px;
        border-bottom: 1px solid #2a2a18;
      }
      .pvp-lb-table tr.pvp-lb-me td { color: #aabb44; font-weight: bold; }
      .pvp-lb-table tr.pvp-lb-me { background: rgba(170,187,68,0.08); }
      .pvp-lb-rank { width: 60px; text-align: center; }
      .pvp-lb-score { width: 90px; text-align: center; }
      .pvp-lb-addr { font-size: 26px; }
      .pvp-lb-loading { text-align: center; padding: 40px; color: #999988; font-size: 26px; }
      .pvp-lb-empty { text-align: center; padding: 40px; color: #777766; font-size: 26px; }
      .pvp-lb-me-section {
        padding: 10px 24px 14px; border-top: 1px solid #3a3a20;
        font-size: 26px; color: #aabb44;
      }
</style>
  </head>
  <body>
    <div id="root"></div>
    <div style="font-family:yana; position:absolute; left:-1000px; visibility:hidden;">.</div>
    <script type="module" src="/src/main.tsx"></script>

    <div id="pvp-footer" style="position:fixed;bottom:6px;left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;z-index:100;">
      <a href="#" id="pvp-footer-link" class="pvp-footer-link">
        Learn More / Report Issues
      </a>
      <a href="#" id="pvp-leaderboard-link" class="pvp-footer-link">
        Leaderboard
      </a>
    </div>

    <div id="pvp-links-overlay" class="pvp-overlay" style="display:none;">
      <div class="pvp-overlay-box">
        <button id="pvp-links-close" class="pvp-overlay-close">&#x2715;</button>
        <p class="pvp-popup-title" style="font-size:30px;">Kachina Kolosseum</p>
        <p class="pvp-popup-desc" style="width:400px;">
          Kachina Kolosseum is implemented on the Midnight Blockchain. This game demonstrates how privacy preserving smart contracts can be used for real applications.
        </p>
        <a href="https://github.com/effectstream/mnf-game-issues/issues" target="_blank" rel="noopener noreferrer"
           class="pvp-btn-primary">
          Report Issues
        </a>
        <a href="https://github.com/PaimaStudios/pvp-arena/" target="_blank" rel="noopener noreferrer"
           class="pvp-btn-outline">
          Source Code
        </a>
      </div>
    </div>

    <div id="pvp-lb-overlay" class="pvp-overlay" style="display:none;">
      <div class="pvp-overlay-box pvp-overlay-box--wide">
        <button id="pvp-lb-close" class="pvp-overlay-close">&#x2715;</button>
        <div class="pvp-lb-wrap">
          <div class="pvp-lb-header">
            <h2>Leaderboard</h2>
            <p>Top players by wins</p>
          </div>
          <div id="pvp-lb-body" class="pvp-lb-body">
            <div class="pvp-lb-loading">Loading...</div>
          </div>
          <div id="pvp-lb-me" class="pvp-lb-me-section" style="display:none;"></div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        var link = document.getElementById('pvp-footer-link');
        var overlay = document.getElementById('pvp-links-overlay');
        var closeBtn = document.getElementById('pvp-links-close');
        link.addEventListener('click', function(e) {
          e.preventDefault();
          overlay.style.display = 'flex';
        });
        closeBtn.addEventListener('click', function() {
          overlay.style.display = 'none';
        });
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) overlay.style.display = 'none';
        });

        // --- Leaderboard ---
        var lbLink = document.getElementById('pvp-leaderboard-link');
        var lbOverlay = document.getElementById('pvp-lb-overlay');
        var lbClose = document.getElementById('pvp-lb-close');
        var lbBody = document.getElementById('pvp-lb-body');
        var lbMe = document.getElementById('pvp-lb-me');

        function shortAddr(addr) {
          if (addr && addr.length > 20) return addr.slice(0, 20) + '\u2026';
          return addr || 'unknown';
        }

        function renderTable(entries, myAddr) {
          if (!entries || entries.length === 0) {
            lbBody.innerHTML = '<div class="pvp-lb-empty">No ranked players yet.</div>';
            return;
          }
          var html = '<table class="pvp-lb-table"><thead><tr>' +
            '<th class="pvp-lb-rank">#</th><th>Player</th><th class="pvp-lb-score">Wins</th>' +
            '</tr></thead><tbody>';
          var found = false;
          for (var i = 0; i < entries.length; i++) {
            var e = entries[i];
            var isMe = myAddr && e.address === myAddr;
            if (isMe) found = true;
            html += '<tr' + (isMe ? ' class="pvp-lb-me"' : '') + '>' +
              '<td class="pvp-lb-rank">' + e.rank + '</td>' +
              '<td class="pvp-lb-addr">' + shortAddr(e.address) + (isMe ? ' (you)' : '') + '</td>' +
              '<td class="pvp-lb-score">' + e.score + '</td></tr>';
          }
          html += '</tbody></table>';
          lbBody.innerHTML = html;
          return found;
        }

        async function fetchLeaderboard() {
          var baseUrl = window.__pvpNodeApiUrl;
          if (!baseUrl) {
            lbBody.innerHTML = '<div class="pvp-lb-empty">Node API URL not configured.</div>';
            return;
          }
          lbBody.innerHTML = '<div class="pvp-lb-loading">Loading...</div>';
          lbMe.style.display = 'none';

          try {
            var resp = await fetch(baseUrl + '/metrics/leaderboard?limit=50');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var data = await resp.json();
            var myAddr = window.__pvpPlayerAddress || null;
            var found = renderTable(data.entries || [], myAddr);

            // If current player not in the top list, fetch their stats separately
            if (myAddr && !found) {
              try {
                var userResp = await fetch(baseUrl + '/metrics/users/' + encodeURIComponent(myAddr) + '?channel=leaderboard');
                if (userResp.ok) {
                  var userData = await userResp.json();
                  var stats = userData.channels && userData.channels.leaderboard && userData.channels.leaderboard.stats;
                  if (stats && stats.score > 0) {
                    lbMe.innerHTML = 'Your rank: <strong>#' + stats.rank + '</strong> &mdash; ' +
                      stats.score + ' win' + (stats.score !== 1 ? 's' : '') +
                      ' &mdash; ' + stats.matchesPlayed + ' match' + (stats.matchesPlayed !== 1 ? 'es' : '') + ' played';
                    lbMe.style.display = 'block';
                  } else {
                    lbMe.innerHTML = 'You have no ranked wins yet. Play some matches!';
                    lbMe.style.display = 'block';
                  }
                }
              } catch (_) { /* ignore user fetch errors */ }
            }
          } catch (err) {
            lbBody.innerHTML = '<div class="pvp-lb-empty">Could not load leaderboard.<br>' +
              (err.message || err) + '</div>';
          }
        }

        lbLink.addEventListener('click', function(e) {
          e.preventDefault();
          lbOverlay.style.display = 'flex';
          fetchLeaderboard();
        });
        lbClose.addEventListener('click', function() {
          lbOverlay.style.display = 'none';
        });
        lbOverlay.addEventListener('click', function(e) {
          if (e.target === lbOverlay) lbOverlay.style.display = 'none';
        });
      })();
    </script>
  </body>
</html>
